; PlatformIO project configuration for the FR34 companion module
; Board: ESP32-C3-DevKitM-1 (ESP32-C3-MINI-1, integrated USB Serial/JTAG)
;
; Build targets:
;   pio run -e fr34-dual   -> WiFi AP + BLE GATT simultaneously (default)
;   pio run -e fr34-wifi   -> WiFi AP + WebSocket only
;   pio run -e fr34-ble    -> BLE GATT only

[platformio]
default_envs = fr34-dual
src_dir = esp32-companion/src

[common]
platform      = espressif32
board         = esp32-c3-devkitm-1
framework     = arduino
monitor_speed = 115200
build_unflags = -std=gnu++11
build_flags   =
    -DCORE_DEBUG_LEVEL=1
    -std=gnu++17

[env:fr34-wifi]
extends   = common
lib_deps  =
    esphome/AsyncTCP-esphome @ ^2.1.4
    esphome/ESPAsyncWebServer-esphome @ ^3.2.2
    bblanchon/ArduinoJson @ ^7.2.0
build_flags =
    ${common.build_flags}
    -DTRANSPORT_WIFI

[env:fr34-ble]
extends   = common
lib_deps  =
    h2zero/NimBLE-Arduino @ ^2.1.0
build_flags =
    ${common.build_flags}
    -DTRANSPORT_BLE

[env:fr34-dual]
extends   = common
lib_deps  =
    esphome/AsyncTCP-esphome @ ^2.1.4
    esphome/ESPAsyncWebServer-esphome @ ^3.2.2
    bblanchon/ArduinoJson @ ^7.2.0
    h2zero/NimBLE-Arduino @ ^2.1.0
build_flags =
    ${common.build_flags}
    -DTRANSPORT_WIFI
    -DTRANSPORT_BLE