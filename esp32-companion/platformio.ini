; PlatformIO project configuration for the FR34 companion module
; Board: any standard ESP32 DevKit (WROOM-32, WROVER, etc.)
;
; Build targets:
;   pio run -e fr34-wifi   →  WiFi AP + WebSocket web dashboard
;   pio run -e fr34-ble    →  BLE GATT server (pair with Web Bluetooth PWA)

[platformio]
default_envs = fr34-wifi

[common]
platform      = espressif32
board         = esp32dev
framework     = arduino
monitor_speed = 115200
build_unflags = -std=gnu++11
build_flags   =
    -DCORE_DEBUG_LEVEL=1
    -std=gnu++17

[env:fr34-wifi]
extends   = common
lib_deps  =
    esphome/AsyncTCP-esphome @ ^2.1.4
    esphome/ESPAsyncWebServer-esphome @ ^3.2.2
    bblanchon/ArduinoJson @ ^7.2.0
build_flags =
    ${common.build_flags}
    -DTRANSPORT_WIFI

[env:fr34-ble]
extends   = common
lib_deps  =
    h2zero/NimBLE-Arduino @ ^2.1.0
build_flags =
    ${common.build_flags}
    -DTRANSPORT_BLE
