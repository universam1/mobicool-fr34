; PlatformIO project configuration for the FR34 WiFi companion module
; Board: any standard ESP32 DevKit (WROOM-32, WROVER, etc.)

[env:esp32dev]
platform  = espressif32
board     = esp32dev
framework = arduino

; Serial monitor baud rate
monitor_speed = 115200

; Libraries
lib_deps =
    esphome/AsyncTCP-esphome @ ^2.1.4
    esphome/ESPAsyncWebServer-esphome @ ^3.2.2
    bblanchon/ArduinoJson @ ^7.2.0

; Build flags
build_flags =
    -DCORE_DEBUG_LEVEL=1
    -std=gnu++17
build_unflags =
    -std=gnu++11
